<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Storyteller</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1025; --paper: #fdf8f2; --accent: #e8623a;
    --gold: #f0b429; --muted: #8a7d8f; --border: rgba(26,16,37,0.1); --panel: #f5ede0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .header {
    background: var(--ink); padding: 14px 16px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; color: #fff; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .status-dot {
    margin-left: auto; width: 8px; height: 8px;
    border-radius: 50%; background: #4ade80; flex-shrink: 0;
  }
  .status-dot.generating { background: var(--gold); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* Input area */
  .input-section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .input-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--panel);
    resize: vertical;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn-generate {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-generate:hover { opacity: 0.9; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-banner {
    background: #fff1f0; border: 1px solid #fecaca; border-radius: 8px;
    padding: 8px 12px; font-size: 12px; color: #dc2626; display: none;
  }
  .error-banner.visible { display: block; }

  .image-card {
    background: #fff; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(26,16,37,0.06);
    display: none;
  }
  .image-card.visible { display: block; }
  .image-wrap {
    width: 100%; aspect-ratio: 3/2; background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.5s; }

  .loading-overlay {
    position: absolute; inset: 0; background: rgba(253,248,242,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .loading-overlay.visible { opacity: 1; pointer-events: all; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--muted); font-style: italic; }

  .story-meta { padding: 12px 14px; border-top: 1px solid var(--border); }
  .story-time { font-size: 10px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
  .story-summary { font-size: 13px; line-height: 1.6; margin-bottom: 6px; }
  .story-prompt { font-size: 11px; color: var(--muted); font-style: italic; }
  .story-prompt span { color: var(--accent); font-style: normal; font-weight: 500; }

  .section-title { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
  .history-item {
    background: var(--panel); border-radius: 7px; padding: 7px 10px;
    font-size: 12px; color: var(--muted); border: 1px solid var(--border);
    cursor: pointer; line-height: 1.5; transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); color: var(--ink); }
  .history-item .hi-time { font-size: 10px; color: var(--gold); font-weight: 500; margin-bottom: 2px; }

  .placeholder-card {
    background: #fff; border-radius: 12px; border: 1px dashed var(--border);
    padding: 28px 20px; text-align: center; color: var(--muted); font-size: 13px;
  }
  .placeholder-card .icon { font-size: 36px; margin-bottom: 10px; }

  .footer { text-align: center; font-size: 10px; color: var(--muted); padding-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-text">📖 Storyteller</div>
    <div class="logo-sub">Live Meeting Illustrator</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="body">

  <!-- Input Section -->
  <div class="input-section">
    <div class="input-label">📝 What's being discussed?</div>
    <textarea id="topicInput" placeholder="Type or paste what's being discussed in your meeting…&#10;&#10;e.g. 'We are reviewing the Q3 budget and discussing sales targets for next year'"></textarea>
    <button class="btn-generate" id="generateBtn" onclick="generateStory()">
      🎨 Generate Illustration
    </button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <!-- Placeholder shown before first image -->
  <div class="placeholder-card" id="placeholderCard">
    <div class="icon">🎨</div>
    <p>Type what's being discussed above<br/>and press <strong>Generate Illustration</strong></p>
  </div>

  <!-- Image Card -->
  <div class="image-card" id="imageCard">
    <div class="image-wrap">
      <img id="storyImage" src="" alt="Story illustration" style="opacity:0;"/>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Summarising…</div>
      </div>
    </div>
    <div class="story-meta">
      <div class="story-time" id="storyTime"></div>
      <div class="story-summary" id="storySummary"></div>
      <div class="story-prompt">🖌 <span id="storyPrompt"></span></div>
    </div>
  </div>

  <!-- History -->
  <div id="historySection" style="display:none;">
    <div class="section-title">Earlier this meeting</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="footer">Hugging Face · Free image generation</div>
</div>

<script>
const POLLINATIONS_BASE = 'https://image.pollinations.ai/prompt/';
const HF_API_URL = 'https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell';

const STOP_WORDS = new Set([
  'the','a','an','and','or','but','in','on','at','to','for','of','with',
  'is','are','was','were','be','been','being','have','has','had','do','does',
  'did','will','would','could','should','may','might','shall','can','need',
  'i','we','you','he','she','they','it','this','that','these','those','my',
  'our','your','his','her','their','its','me','us','him','them','what','how',
  'when','where','why','who','which','so','if','as','by','from','up','about',
  'into','through','during','before','after','above','below','between','out',
  'off','over','under','again','then','once','here','there','just','also',
  'very','more','most','other','some','such','no','not','only','same','than',
  'too','really','like','know','think','going','yeah','okay','yes','right',
  'actually','basically','kind','sort','mean','guess','um','uh','well','let',
  'get','got','go','make','see','say','said','want','need','look','come',
  'take','give','use','find','tell','ask','work','seem','feel','try','leave',
  'call','keep','put','set','run','move','live','believe','hold','bring','happen'
]);

const TOPIC_SCENES = {
  budget:'business people reviewing financial charts',
  finance:'financial analysts studying colorful stock market data',
  sales:'salespeople celebrating a deal with handshakes',
  marketing:'creative team brainstorming around a whiteboard',
  strategy:'chess pieces on a board with business people planning',
  product:'engineers building and launching a rocket',
  launch:'rocket launching into a colorful sky',
  deadline:'person racing against a giant clock',
  project:'team collaborating on colorful building blocks',
  team:'diverse group of people working together',
  meeting:'people in discussion around a glowing table',
  data:'colorful bar charts floating in the air',
  growth:'tiny plant growing into a towering tree',
  customer:'happy customers receiving wrapped gift boxes',
  design:'artists splashing paint on enormous canvases',
  code:'programmer surrounded by glowing lines of code',
  software:'gears and circuits forming an elegant machine',
  technology:'futuristic city with glowing holographic interfaces',
  security:'knight guarding a glowing golden vault door',
  hiring:'manager welcoming a smiling new team member',
  training:'teacher writing on chalkboard for eager students',
  health:'cheerful doctor and patient in a sunny clinic',
  surgery:'surgeon performing careful operation in bright theatre',
  medical:'doctors reviewing patient scans in a hospital',
  knee:'doctor carefully examining knee with medical tools',
  science:'scientists experimenting with glowing colorful beakers',
  education:'students learning in a sunny colorful classroom',
  sport:'athletes competing on a vibrant sports field',
  innovation:'inventor surrounded by floating lightbulbs',
  revenue:'golden coins raining into a treasure chest',
  remote:'people on glowing screens waving from cozy homes',
  legal:'lawyers reviewing scrolls in a grand hall',
  compliance:'inspector ticking items on a golden checklist',
  risk:'tightrope walker crossing between two tall buildings',
  partnership:'two groups joining hands to build a bridge',
};

let storyHistory = [];

async function generateStory() {
  const text = document.getElementById('topicInput').value.trim();
  if (!text) {
    showError('Please type what is being discussed first!');
    return;
  }

  hideError();
  setGenerating(true);
  setLoadingText('Summarising topic…');
  showImageCard(true);

  try {
    // Step 1: Build summary and image prompt
    const { summary, imagePrompt } = buildStory(text);

    // Step 2: Generate image
    setLoadingText('Generating illustration…');
    const styledPrompt = imagePrompt + ', illustrated cartoon style, vibrant colors, storybook illustration, flat design, high quality';
    const imageData = await fetchImage(styledPrompt);

    // Step 3: Render
    renderStory({ summary, imagePrompt, imageData, timestamp: new Date().toLocaleTimeString() });

  } catch(err) {
    showError('Could not generate image: ' + err.message + '. Please try again.');
    setGenerating(false);
    showLoading(false);
  }
}

// Allow Enter+Ctrl to submit
document.getElementById('topicInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) generateStory();
});

function buildStory(text) {
  const words = text.toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/)
    .filter(w => w.length > 3 && !STOP_WORDS.has(w));

  const freq = {};
  words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
  const topWords = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,8).map(([w]) => w);

  if (topWords.length === 0) return {
    summary: text.slice(0, 120),
    imagePrompt: 'people having a productive discussion around a glowing table'
  };

  let imagePrompt = null;
  for (const w of topWords) {
    if (TOPIC_SCENES[w]) { imagePrompt = TOPIC_SCENES[w]; break; }
  }
  if (!imagePrompt) imagePrompt = 'people enthusiastically collaborating on ' + topWords.slice(0,3).join(', ') + ' in a vibrant workspace';

  const summary = text.length > 120 ? text.slice(0, 120) + '…' : text;
  return { summary, imagePrompt };
}

async function fetchImage(prompt) {
  // Try Hugging Face first
  try {
    const response = await fetch(HF_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ inputs: prompt })
    });
    if (response.ok) {
      const blob = await response.blob();
      if (blob.type.startsWith('image/')) return URL.createObjectURL(blob);
    }
  } catch(e) {
    console.warn('HF failed:', e.message);
  }

  // Fall back to Pollinations
  const url = POLLINATIONS_BASE + encodeURIComponent(prompt) + '?width=768&height=512&nologo=true&seed=' + Date.now();
  const response = await fetch(url);
  if (!response.ok) throw new Error('Image generation failed');
  const blob = await response.blob();
  return URL.createObjectURL(blob);
}

function renderStory(story) {
  showLoading(false);
  setGenerating(false);

  const img = document.getElementById('storyImage');
  img.style.opacity = '0';
  img.src = story.imageData;
  img.onload = () => { img.style.opacity = '1'; };

  document.getElementById('storyTime').textContent = '🕐 ' + story.timestamp;
  document.getElementById('storySummary').textContent = story.summary;
  document.getElementById('storyPrompt').textContent = story.imagePrompt;

  // Add to history
  storyHistory.unshift(story);
  if (storyHistory.length > 6) storyHistory.pop();
  renderHistory();
}

function renderHistory() {
  if (storyHistory.length <= 1) return;
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = '';
  storyHistory.slice(1).forEach(s => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `<div class="hi-time">${s.timestamp}</div>${s.summary}`;
    div.onclick = () => {
      document.getElementById('storyImage').src = s.imageData;
      document.getElementById('storySummary').textContent = s.summary;
      document.getElementById('storyPrompt').textContent = s.imagePrompt;
      document.getElementById('storyTime').textContent = '🕐 ' + s.timestamp;
    };
    list.appendChild(div);
  });
}

function showImageCard(show) {
  document.getElementById('imageCard').classList.toggle('visible', show);
  document.getElementById('placeholderCard').style.display = show ? 'none' : 'block';
  if (show) showLoading(true);
}

function showLoading(show) { document.getElementById('loadingOverlay').classList.toggle('visible', show); }
function setLoadingText(t) { document.getElementById('loadingText').textContent = t; }
function setGenerating(v) {
  document.getElementById('generateBtn').disabled = v;
  document.getElementById('generateBtn').textContent = v ? '⏳ Generating…' : '🎨 Generate Illustration';
  document.getElementById('statusDot').className = 'status-dot' + (v ? ' generating' : '');
}
function showError(msg) { const b = document.getElementById('errorBanner'); b.textContent = '⚠️ ' + msg; b.classList.add('visible'); }
function hideError() { document.getElementById('errorBanner').classList.remove('visible'); }
</script>
</body>
</html>
